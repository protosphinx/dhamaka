<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 360"
     role="img"
     aria-label="Dhamaka - browser-local LLM workflows for web apps">
  <title>Dhamaka</title>
  <desc>Browser-local LLM workflows for private app context, tools, validators, and structured output.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f775d"/>
      <stop offset="48%" stop-color="#315f91"/>
      <stop offset="100%" stop-color="#cf3e58"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#20252b" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="#0b0d10"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.42"/>
  <rect x="48" y="48" width="1104" height="264" rx="20" fill="#11151a" stroke="#2a3038" stroke-width="2"/>
  <rect x="48" y="48" width="1104" height="7" rx="3.5" fill="url(#accent)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="92" y="156"
          fill="#f7f8f5"
          font-size="92"
          font-weight="800"
          letter-spacing="-1">
      Dhamaka
    </text>

    <text x="96" y="208"
          fill="#cfd6d3"
          font-size="30"
          font-weight="560">
      Browser-local LLM workflows for real web apps.
    </text>

    <text x="96" y="256"
          fill="#8f9a96"
          font-size="22"
          font-weight="500">
      private context  /  app tools  /  validators  /  structured output
    </text>
  </g>

  <g transform="translate(846 112)">
    <rect x="0" y="0" width="242" height="136" rx="16" fill="#0b0d10" stroke="#303842" stroke-width="2"/>
    <circle cx="37" cy="40" r="9" fill="#1f775d"/>
    <circle cx="67" cy="40" r="9" fill="#315f91"/>
    <circle cx="97" cy="40" r="9" fill="#cf3e58"/>
    <path d="M36 82 H206" stroke="#51606b" stroke-width="8" stroke-linecap="round"/>
    <path d="M36 111 H164" stroke="#51606b" stroke-width="8" stroke-linecap="round"/>
    <path d="M36 82 H136" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="18"
     fill="#cfd6d3">
    <text x="96" y="304">dhamaka.dev</text>
    <text x="1032" y="304" text-anchor="end">Apache-2.0</text>
  </g>
</svg>
